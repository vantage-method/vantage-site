<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Vantage Method</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/brand/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/brand/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Barlow', sans-serif;
            color: #0a0a0a;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }

        .container {
            max-width: 480px;
        }

        .logo {
            width: 48px;
            height: auto;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: clamp(2.5rem, 5vw, 4rem);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            line-height: 1.1;
            margin-bottom: 1rem;
        }

        p {
            color: #666666;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .btn {
            display: inline-block;
            padding: 0.85rem 2.2rem;
            border: 2px solid #007c87;
            color: #007c87;
            font-family: 'Barlow', sans-serif;
            font-weight: 500;
            font-size: 0.95rem;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-radius: 4px;
            transition: background 0.25s ease, color 0.25s ease;
        }

        .btn:hover {
            background: #007c87;
            color: #ffffff;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="/"><img src="/assets/images/brand/Vantage-Method-Dark.png" alt="Vantage Method" class="logo"></a>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="btn">Back to Home</a>
    </div>
</body>

</html>

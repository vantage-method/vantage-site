<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Scope & Readiness Assessment — Vantage Method</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/brand/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/brand/apple-touch-icon.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/assessment/assessment.css">
</head>

<body>

<header>
    <a href="/" class="header-home" aria-label="Back to homepage">
        <img src="/assets/images/brand/Vantage-Method-Light.png" alt="Vantage Method" class="header-logo">
    </a>
    <div class="header-text">
        <div class="label">Vantage Method</div>
        <h1>Marketing Scope &amp;<br>Readiness Assessment</h1>
        <div class="subtitle">For Equity-Based Marketing Engagement</div>
    </div>
</header>

<div class="meta-bar">
    <div class="meta-field">
        <label>Company Name</label>
        <input type="text" id="company-name" placeholder="Enter company name">
    </div>
    <div class="meta-field">
        <label>Date</label>
        <input type="text" id="date-field" placeholder="MM/DD/YYYY">
    </div>
    <div class="meta-field">
        <label>Primary Contact</label>
        <input type="text" id="contact-name" placeholder="Enter contact name">
    </div>
</div>

<div class="legend" id="legend">
    <span class="legend-label">Legend</span>
    <div class="legend-items">
        <div class="legend-item"><span class="badge badge-A">A</span> Completed</div>
        <div class="legend-item"><span class="badge badge-P">P</span> In Progress</div>
        <div class="legend-item"><span class="badge badge-N">N</span> Needs Development</div>
        <div class="legend-item"><span class="badge badge-X">X</span> Not Needed</div>
    </div>
</div>

<main id="main-content"></main>

<script src="/assessment/assessment.js"></script>
</body>
</html>
